<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JerryMindMap</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f6f7f9;
    color: #333;
    padding: 40px 20px;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
  }

  .title {
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 12px;
    color: #222;
  }

  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 50px;
    font-size: 16px;
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px;
  }

  .book-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .book-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.09);
  }

  .book-icon {
    width: 50px;
    height: 50px;
    background: #4a6cf7;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .book-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #222;
  }

  .book-desc {
    font-size: 14px;
    color: #777;
    line-height: 1.4;
  }
</style>
</head>

<body>
<div class="container">
  <div class="title">JerryMindMap</div>
  <div class="subtitle">3D 思维导图图书馆</div>

  <div class="book-grid">
    <!-- 卡片1：你只要复制这一块，改文字和链接 -->
    <a class="book-card" href="book-1.html">
      <div class="book-icon"></div>
      <div class="book-name">当下的力量</div>
      <div class="book-desc">认知与正念思维</div>
    </a>

    <a class="book-card" href="book-2.html">
      <div class="book-icon"></div>
      <div class="book-name">高效能人士</div>
      <div class="book-desc">习惯与自我管理</div>
    </a>

    <a class="book-card" href="book-3.html">
      <div class="book-icon"></div>
      <div class="book-name">学习方法论</div>
      <div class="book-desc">记忆与理解模型</div>
    </a>

    <a class="book-card" href="book-4.html">
      <div class="book-icon"></div>
      <div class="book-name">心理学基础</div>
      <div class="book-desc">心智与行为模型</div>
    </a>
  </div>
</div>
</body>
</html>
