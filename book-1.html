<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>当下的力量 - 3D导图</title>
<script src="https://cdn.bootcdn.net/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
<style>body{margin:0}</style>
</head>
<body>
<a-scene background="color: #0b1220">
<a-light type="ambient" intensity="0.6"></a-light>
<a-light type="directional" position="0 10 0" intensity="0.9"></a-light>
<a-camera wasd-controls look-controls></a-camera>

<a-sphere position="0 0 0" radius="1.2" color="#ff5e57">
<a-text value="当下的力量" align="center" color="#fff" position="0 0 1.3" scale="3 3 3"></a-text>
</a-sphere>

<a-box position="-4 2 0" color="#34ace0" depth="0.4">
<a-text value="摆脱心理时间" align="center" color="#fff" position="0 0 0.7" scale="2 2 2"></a-text>
</a-sphere>
</a-scene>
</body>
</html>
